<!-- KaTeX CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">

<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Microsoft YaHei',sans-serif;background:#e8eaed}

/* ===== TOP BAR ===== */
#topbar{
  height:46px;background:#1a3a6b;color:#fff;
  display:flex;align-items:center;padding:0 16px;gap:10px;
  flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.4);z-index:10;position:relative;
}
#topbar h1{font-size:14px;font-weight:600;letter-spacing:.3px}
#topbar .subtitle{font-size:11px;color:#adc6f5;margin-left:4px}

/* ===== LAYOUT ===== */
#app{display:flex;height:calc(100vh - 46px);overflow:hidden}

/* ===== SIDEBAR ===== */
#sidebar{
  width:272px;min-width:272px;background:#fff;
  border-right:1px solid #dde;overflow-y:auto;
  display:flex;flex-direction:column;
  font-size:12px;
}
.sb-section{padding:10px 12px;border-bottom:1px solid #eee}
.sb-title{
  font-size:10.5px;font-weight:700;color:#555;
  text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:7px;display:flex;align-items:center;gap:5px;
}
.sb-label{display:block;color:#444;margin-bottom:2px;font-size:11.5px}
.sb-select{
  width:100%;padding:4px 6px;border:1px solid #ccc;border-radius:4px;
  font-size:12px;color:#333;margin-bottom:7px;background:#fafafa;
}
.sb-input{
  width:100%;padding:4px 6px;border:1px solid #ccc;border-radius:4px;
  font-size:12px;color:#333;margin-bottom:7px;background:#fafafa;
}
.sb-select:focus{outline:none;border-color:#1a3a6b}
.sb-input:focus{outline:none;border-color:#1a3a6b}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid2 .sb-select{margin-bottom:0}

/* Template chips */
.tpl-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.tpl{
  padding:3px 9px;border:1.5px solid #bbb;border-radius:12px;
  cursor:pointer;font-size:11px;white-space:nowrap;transition:.12s;
}
.tpl:hover{border-color:#4a7ec7;color:#1a3a6b}
.tpl.active{border-color:#1a3a6b;background:#1a3a6b;color:#fff}

/* Download area */
.dl-area{margin-top:auto;padding:12px;border-top:1px solid #eee}
.btn{
  display:block;width:100%;padding:9px 0;border:none;border-radius:6px;
  font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;
  transition:opacity .18s;letter-spacing:.3px;
}
.btn:hover{opacity:.84}
.btn:active{opacity:.7;transform:scale(.98)}
.btn-docx{background:#1f4e79;color:#fff}
.btn-pdf{background:#c00000;color:#fff}
.btn:last-child{margin-bottom:0}

/* ===== MAIN CONTENT ===== */
#main{flex:1;overflow-y:auto;background:#dde1e8;padding:20px 28px}

/* ===== A4 PAGE ===== */
#document-page{
  /* page size */
  width:210mm;min-height:297mm;
  margin:0 auto;
  /* page margins are template-driven */
  padding:var(--page-top) var(--page-right) var(--page-bottom) var(--page-left);
  background:#fff;
  box-shadow:0 3px 14px rgba(0,0,0,.2);
  position:relative;

  /* === CSS VARIABLES (live-updated) === */
  --h0-font:'SimSun','宋体',serif;
  --h0-size:10.5pt;
  --h0-weight:bold;
  --h0-align:center;
  --body-font:'SimSun','宋体',serif;
  --body-size:12pt;
  --body-lh:1.5;
  --h1-font:'SimHei','黑体',sans-serif;
  --h1-size:15pt;
  --h1-weight:bold;
  --h1-align:center;
  --h2-font:'SimHei','黑体',sans-serif;
  --h2-size:14pt;
  --h2-weight:bold;
  --h2-align:left;
  --h3-font:'SimSun','宋体',serif;
  --h3-size:12pt;
  --h3-weight:bold;
  --h3-align:left;
  --page-top:2cm;
  --page-right:2cm;
  --page-bottom:2cm;
  --page-left:2.5cm;
  --page-gutter:0.5cm;
  --cover-title-font:'SimHei','黑体',sans-serif;
  --cover-title-size:16pt;
  --cover-title-align:center;
  --cover-meta-size:12pt;
  --cover-bio-size:10.5pt;
}

/* Page header (preview) */
.pg-header{
  font-family:'SimSun','宋体',serif;font-size:9pt;color:#777;
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:4pt;border-bottom:.5pt solid #bbb;margin-bottom:18pt;
}
.pg-header span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-header span:first-child{text-align:left}
.pg-header span:nth-child(2){text-align:center}
.pg-header span:last-child{text-align:right}

/* Headings */
#doc-content .dh0,.pdf-doc-content .dh0{
  font-family:var(--h0-font);font-size:var(--h0-size);
  font-weight:var(--h0-weight);text-align:var(--h0-align);
  margin-top:18pt;margin-bottom:8pt;
}
#doc-content .dh0:first-child,.pdf-doc-content .dh0:first-child{margin-top:0}

/* PDF export pages */
.pdf-export-page{
  width:210mm;height:297mm;
  padding:var(--page-top) var(--page-right) var(--page-bottom) var(--page-left);
  background:#fff;box-sizing:border-box;
  display:flex;flex-direction:column;
  page-break-after:always;break-after:page;
}
.pdf-export-page:last-child{page-break-after:auto;break-after:auto}
.pdf-page-header{
  font-family:'SimSun','宋体',serif;font-size:9pt;color:#777;
  display:flex;justify-content:space-between;align-items:center;
  padding-bottom:4pt;border-bottom:.5pt solid #bbb;margin-bottom:18pt;
  min-height:16pt;flex-shrink:0;
}
.pdf-page-header span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdf-page-header .hdr-left{text-align:left}
.pdf-page-header .hdr-center{text-align:center}
.pdf-page-header .hdr-right{text-align:right}
.pdf-page-content{flex:1;overflow:hidden;min-height:0}
.pdf-page-footer{
  font-family:'SimSun','宋体',serif;font-size:9pt;color:#777;
  border-top:.5pt solid #bbb;margin-top:12pt;padding-top:4pt;
  min-height:16pt;flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
}
.pdf-page-footer span{flex:1}
.pdf-page-footer .ftr-left{text-align:left}
.pdf-page-footer .ftr-center{text-align:center}
.pdf-page-footer .ftr-right{text-align:right}

/* Content area inheriting vars */
#doc-content,.pdf-doc-content{
  font-family:var(--body-font);
  font-size:var(--body-size);
  line-height:var(--body-lh);
  color:#000;
}

/* Headings */
#doc-content .dh1,.pdf-doc-content .dh1{
  font-family:var(--h1-font);font-size:var(--h1-size);
  font-weight:var(--h1-weight);text-align:var(--h1-align);
  margin-top:24pt;margin-bottom:12pt;
}
#doc-content .dh1:first-child,.pdf-doc-content .dh1:first-child{margin-top:0}
#doc-content .dh2,.pdf-doc-content .dh2{
  font-family:var(--h2-font);font-size:var(--h2-size);
  font-weight:var(--h2-weight);text-align:var(--h2-align);
  margin-top:14pt;margin-bottom:6pt;
}
#doc-content .dh3,.pdf-doc-content .dh3{
  font-family:var(--h3-font);font-size:var(--h3-size);
  font-weight:var(--h3-weight);text-align:var(--h3-align);
  margin-top:10pt;margin-bottom:4pt;
}

/* Paragraphs */
#doc-content .dp,.pdf-doc-content .dp{
  font-family:var(--body-font);font-size:var(--body-size);
  line-height:var(--body-lh);text-indent:2em;margin-bottom:5pt;
}
#doc-content .dp.no-indent,.pdf-doc-content .dp.no-indent{text-indent:0}

/* Formula blocks */
.df-wrap{
  display:flex;align-items:center;justify-content:center;
  margin:9pt 0;position:relative;
}
.df-wrap .df-num{
  position:absolute;right:0;
  font-family:var(--body-font);font-size:var(--body-size);
}
.df-inner{text-align:center}

/* Figure / image blocks */
.df-figure{
  display:block;margin:14pt auto;text-align:center;
}
.df-figure img{
  max-width:100%;height:auto;display:block;margin:0 auto;
  border:0;
}
.df-figure figcaption{

  text-align:center;
}

/* Keywords line */

/* Cover (template-driven) */

<!-- ===== DYNAMIC SCRIPT LOADER (multi-CDN fallback) ===== -->
<script>
/**
 * Try loading a script from each URL in sequence; resolve on first success.
 * If all fail, resolve anyway (caller checks window global).
 */
function loadScript(urls, globalCheck) {
  return new Promise(resolve => {
    let idx = 0;
    function tryNext() {
      if (idx >= urls.length) { resolve(false); return; }
      const url = urls[idx++];
      const s = document.createElement('script');
      s.src = url;
      s.crossOrigin = 'anonymous';
      s.onload = () => {
        // Some UMD bundles need a tick to set the global
        setTimeout(() => {
          if (!globalCheck || globalCheck()) { resolve(true); }
          else { tryNext(); }           // script loaded but global not set → try next
        }, 30);
      };
      s.onerror = () => { document.head.removeChild(s); tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  });
}

  {type:'para', text:'本文研究在障碍物密集空间中保持预设编队的多机器人系统最优运动规划问题。我们提出一个完整的运行框架，覆盖从全局规划到局部规划，以及从外部障碍物避让到内部障碍物避让。尤其在该框架中，路径规划与编队保持被统一考虑。首先，采用增强型 A* 算法进行全局路径规划。随后提出基于局部自由空间（Local Free Space）的新型优化框架以确定机器人最优目标位置。接着，利用形状理论将编队保持表述为线性约束优化问题，并给出求解最优解的算法。为防止机器人间碰撞，引入互易速度障碍（RVO）方法进行局部运动协调。最后，仿真结果表明，所提方法能够在复杂环境中实现无碰撞、保持编队的导航。'},

  {type:'para', text:'随后，本文研究在障碍物环境中保持既定编队的多机器人系统最优运动的优化方法。近期研究表明，基于 Voronoi 的表示能够显著提升导航安全性与效率。基于 Voronoi 拓扑的无碰撞 A* 算法用于动态障碍环境的自适应重规划 [4]；加权 Voronoi 图与改进 A* 的融合能够优先获得高安全裕度、短路径并降低计算量 [5]。清理后的广义 Voronoi 图（GVD）通过裁剪冗余边并生成紧凑拓扑图，提高了路径计算效率 [6]。此外，幂图（power diagram）通过定义凸的无碰撞区域并生成连续向量场，可实现精确的反应式导航 [7]。这些方法体现了 Voronoi 结构的通用性 [8]，但多聚焦于几何层面，未能同时解决避障与编队保持的双重问题。为保证与障碍物的碰撞避免，本文借鉴 [7] 采用局部自由空间 LF 的概念；为保持预设编队，采用形状理论作为策略 [9]。因此本文在上述两类约束下构建优化问题。文献 [10] 与 [11] 对本研究具有启发：[10] 关注基于形状理论的最优编队与最优匹配算法，[11] 通过拉普拉斯矩阵的分布式优化研究同类问题。但二者均未考虑障碍环境，且仅关注形成编队的过程，而非具有预设形状的完整路径导航过程。本文覆盖导航与编队保持的全过程。'},
  {type:'para', text:'在获得最优解后，多机器人系统仍需在动态环境中保持无碰撞协同。增强型互易速度障碍（RVO）方法推动了分布式运动安全。V-RVO 框架将缓冲的 Voronoi 单元与 RVO 锥结合，用于密集多机器人避碰 [12]；改进的 Hybrid RVO 在不进行智能体通信的情况下适应动力学约束 [13]。与此同时，情感 RVO 与优先级 RVO 通过调节机器人间距离与避碰优先级改进领航—跟随行为 [14]、[15]。这些工作共同强化了多机器人编队导航中的外部与内部避障机制。尽管如此，上述方法多侧重局部交互，未将外部障碍下的编队保持统一考虑。为此，本文构建分层避障系统，通过该方法防止机器人间内部碰撞。'},
  {type:'para', text:'本文的主要贡献在于提出一个同时解决路径规划与编队保持的新框架。通过引入局部自由空间概念，我们将最优编队算法从空旷环境扩展到障碍密集环境下的导航与编队保持。另一项贡献是构建内外分层的障碍物避让系统：外层采用局部自由空间，内层引入 RVO 方法。该系统在实现完整避障的同时显著降低算法复杂度。最后，通过仿真验证了该方法的准确性与效率。'},
  {type:'para', text:'符号说明：本文中，R 表示实数域，R^d 表示 d 维实向量空间。形式 [a,b] 表示元素各维度被约束在 [a,b] 内。R^{m×n} 表示实数域上的 m×n 矩阵。SO(d) 表示 d 阶特殊正交群。[S] 表示与 S 具有相同形状的编队等价类。∥·∥ 表示欧氏范数。'},

  {type:'h1', text:'II 全局路径规划'},
  {type:'para', text:'参考经典文献 [16]，原始 A* 算法的代价函数定义为：'},
  {type:'formula', latex:'\\begin{aligned}f(n)&=g(n)+h(n)\\\\g(n)&=g(n-1)+d_{n-1\\to n}\\end{aligned}', num:'(1)'},
  {type:'para', text:'其中 g(n) 表示从起点到当前节点 n 的实际代价，h(n) 表示从节点 n 到目标的估计代价（启发函数），f(n) 表示经过节点 n 的路径总估计代价。d_{n-1→n} 为前一节点 n−1 到节点 n 的欧氏距离，是基础几何代价。'},
  {type:'para', text:'在标准 A* 的基础上，引入安全权重 W 来修正运动代价，形式为：'},
  {type:'formula', latex:'\\begin{aligned}g(n)&=g(n-1)+W\\cdot d_{n-1\\to n}\\\\W&=1+\\frac{1}{d_{\\min}+\\varepsilon}\\end{aligned}', num:'(2)'},
  {type:'para', text:'其中 d_min 表示到障碍物或环境边界的最小允许距离，ε 为避免除零的微小常数。该加权形式会惩罚贴近障碍物或边界的路径，从而生成安全裕度更高的轨迹。'},
  {type:'para', text:'在预定义环境地图中运行 A* 搜索，得到从起点 B 到目标点 T0 的全局最优路径 P。该路径由有序中间航点组成，表示为 P={B,T1,T2,…,Tk,T0}。各机器人依次跟随这些航点，最终到达目标位置。'},

  {type:'h1', text:'III 局部路径规划'},
  {type:'h2', text:'A. 局部自由空间'},
  {type:'para', text:'首先考虑包含圆盘障碍物的封闭空间 W。空间内有 m 个障碍物、n 个机器人，其中第 j 个障碍物中心为 O_j、半径为 R_j；第 i 个圆盘机器人中心为 p_i、半径为 r_i，最大机器人半径记为 r_m=max_{1≤i≤n} r_i。编队质心记为 p_c。为避免编队离开工作空间，在 [7] 的基础上定义有效工作空间：'},
  {type:'formula', latex:'\\widetilde{W}=\\{q\\in W\\mid B(q,r_m)\\subseteq W\\}', num:'(3)'},
  {type:'para', text:'为方便起见，下文用 W 表示 W̃。为避免碰撞，定义机器人局部自由空间 LF(x)：'},
  {type:'formula', latex:'LF(x)=\\{q\\in W\\mid q\\in\\bigcap_{i=1}^{N} H_i(x)\\}', num:'(4)'},
  {type:'para', text:'其中 H_i 为由编队质心 p_c 与障碍物 O_i 形成的半平面：'},
  {type:'formula', latex:'\\begin{aligned}H_i(x)&=\\{q\\in W\\mid (q-p_c)^\\top d_i\\le c_i\\}\\\\d_i&=\\frac{O_i-p_c}{\\|O_i-p_c\\|},\\quad c_i=\\|O_i-p_c\\|-(R_i+r_m)\\end{aligned}', num:'(5)'},
  {type:'para', text:'将上述半平面构造推广到凸多边形障碍物，则有：'},
  {type:'formula', latex:'\\begin{aligned}H_k(x)&=\\{q\\in W\\mid (q-p_c)^\\top v_k\\le c_k\\}\\\\c_k&=d_{\\mathrm{Edge},k}-r_m\\end{aligned}', num:'(6)'},
  {type:'para', text:'其中 v_k 是距离 p_c 最近的障碍物 O_k 的边的单位法向量，d_{Edge,k} 为 p_c 到该边的欧氏距离，c_k=d_{Edge,k}−r_m。若有多条边距离相同，则选取其法向量与当前运动方向夹角最大的那条边。'},
  {type:'para', text:'因此 LF 的完整定义为：'},
  {type:'formula', latex:'LF=\\{q\\in W\\mid q\\in\\bigcap_{i=1}^{N_{\\mathrm{disk}}} H_{\\mathrm{disk},i}\\cap\\bigcap_{k=1}^{N_{\\mathrm{poly}}} H_{\\mathrm{poly},k}\\}', num:'(7)'},
  {type:'para', text:'由于 LF 由多个半平面交集构成，因此 LF 为凸集。并且由于 LF 与障碍物之间留有安全裕度，机器人在 LF 中运动时不会与障碍物发生碰撞。'},

  {type:'h2', text:'B. 最优编队问题的表述'},
  {type:'para', text:'考虑多机器人系统在保持给定编队形状的同时最优地运动到目标。编队由 n 个点 s_1,s_2,…,s_n 构成，其中 s_i∈R^2。此前通过 A* 算法给出一系列虚拟目标 T_1,T_2,…,T_l 以及真实目标 T_0。每个 T_i 可按照参考编队扩展为 (T_{i1},T_{i2},…,T_{in})，其中 T_i^c=(1/n)∑_{j=1}^n T_i^j 为编队质心。但要求每个机器人运动均处于 LF 内，因此需确定中间航点 q_k，使下一组目标整体位于 LF 中。'},
  {type:'para', text:'不失一般性，先分析单次动作。为最小化机器人与目标的距离，将航点选择问题表述为：'},
  {type:'formula', latex:'\\begin{aligned}\\min_Q\\ &\\sum_{i=1}^{n}\\left(\\frac{\\lambda}{2}\\|q_i-T_i\\|^2+(1-\\lambda)\\|q_i-T_i\\|_1\\right)\\\\\\text{s.t. }& Q\\in[S],\\quad q_i\\in LF,\\ i=1,\\ldots,n\\end{aligned}', num:'(8)'},
  {type:'para', text:'其中 λ∈[0,1] 为权重系数，用于调节编队紧凑性；q_i∈R^2 为第 i 个机器人的目标位置；Q=(q_1,q_2,…,q_n)∈R^{2×n} 为目标编队矩阵；S=(s_1,s_2,…,s_n)∈R^{2×n} 为参考编队；T 为当前机器人群体的目标。'},
  {type:'para', text:'为简化约束，将 Q∈[S] 转化为线性等式约束 Aq=0 [9]，其中 q=(q_1^T,q_2^T,…,q_n^T)∈R^{2n}，M_i 与 A 构造为：'},
  {type:'formula', latex:'M_i=\\begin{pmatrix}s_{i,x}&-s_{i,y}\\\\s_{i,y}&s_{i,x}\\end{pmatrix},\\quad A=\\begin{pmatrix}M_3-M_2&-M_3&M_2&O&\\cdots&O\\\\M_4-M_2&-M_4&O&M_2&\\cdots&O\\\\\\vdots&\\vdots&\\vdots&\\vdots&\\ddots&\\vdots\\\\M_n-M_2&-M_n&O&O&\\cdots&M_2\\end{pmatrix}'},
  {type:'para', text:'引理1：公式 (8) 可改写为：'},
  {type:'formula', latex:'\\begin{aligned}\\min_Q\\ &\\frac{\\lambda}{2}\\|q-T\\|^2+(1-\\lambda)\\|q-T\\|_1\\\\\\text{s.t. }&Aq=0,\\quad q\\in LF^n\\end{aligned}', num:'(9)'},
  {type:'para', text:'其中 T=(T_1^T,T_2^T,…,T_n^T)∈R^{2n}，LF^n=∏_{i=1}^n LF。'},
  {type:'para', text:'证明：Q∈[S] 表示 Q 仅能由 S 通过旋转、缩放和平移获得。令 s_1=(0,0)，则 p_i−p_1=cRs_i，其中常数 c 表示缩放因子，矩阵 R∈SO(2) 表示旋转因子。将向量 p_i 与 s_i 视为复数，则 R 可视为复数 r，有 p_i−p_1=crs_i。当 i=1 时有 p_2−p_1=crs_2。两式相除得到 (p_i−p_1)/(p_2−p_1)=s_i/s_2，即 s_2·(p_i−p_1)=s_i·(p_2−p_1)。上述等式可写成矩阵形式 M_2(p_i−p_1)=M_i(p_2−p_1)，整理得到 (M_i−M_2)p_1−M_i p_2+M_2 p_i=0。因而得证。多机器人系统的每一步动作均遵循同样逻辑。'},

  {type:'h1', text:'IV 最优编队算法描述与收敛性分析'},
  {type:'para', text:'本节求解式 (9) 的最优解。下述引理给出充要条件，其证明类似于文献 [17] 的定理 1。'},
  {type:'para', text:'引理2 [17]：设 σ 为正常数，ϕ: R^{nm}→LF^n、ψ: R^{nm}→[−1,1]^{nm} 为投影算子。q*∈R^{nm} 为 (9) 的最优解，当且仅当存在 y*∈R^l（l 为 A 的行数）与 z*∈R^{nm}，使 (q*,y*,z*) 满足：'},
  {type:'formula', latex:'\\begin{cases}q^*=\\varphi\\bigl(q^*-\\sigma(\\lambda(q^*-p)+(1-\\lambda)z^*+A^\\top y^*)\\bigr)\\\\Aq^*=0\\\\z^*=\\psi(z^*+q^*-p)\\end{cases}', num:'(10)'},
  {type:'para', text:'由此可给出求解 (10) 的迭代算法：'},
  {type:'formula', latex:'\\begin{cases}q_{k+1}=\\varphi\\bigl(q_k-\\sigma(\\lambda(q_k-p)+(1-\\lambda)\\psi(z_k+q_k-p)+A^\\top(y_k+Aq_k))\\bigr)\\\\y_{k+1}=y_k+Aq_{k+1}\\\\z_{k+1}=\\psi(z_k+q_{k+1}-p)\\end{cases}', num:'(11)'},
  {type:'para', text:'这里用下标表示迭代序列，即 q_k=q(k)、y_k=y(k)、z_k=z(k)。第一式表示以常步长梯度下降并同时保持编队约束；y_k 是约束 Aq=0 的拉格朗日乘子；z_k 是 L1 范数的次梯度辅助变量，用于处理 L1 范数的非光滑性。'},
  {type:'para', text:'定理1：对任意初始条件 (q_0,y_0,z_0)，若步长 σ 满足'},
  {type:'formula', latex:'\\sigma<\\frac{1}{2+\\lambda_{\\max}(A^\\top A)}'},
  {type:'para', text:'则投影算法生成的序列 {q_k} 全局收敛到编队优化问题的最优解 q*，其中 λ_max(·) 表示矩阵 A^T A 的最大特征值，A 为由编队约束构造的满行秩矩阵。'},
  {type:'para', text:'证明：收敛性证明采用文献 [10] 的方法。考虑 Lyapunov 候选函数：'},
  {type:'formula', latex:'V(q_k,y_k,z_k)=\\|q_k-q^*\\|^2+\\sigma\\|y_k-y^*\\|^2+(1-\\lambda)\\|z_k-z^*\\|^2'},
  {type:'para', text:'由更新规则可得如下不等式：'},
  {type:'formula', latex:'V_1(q_{k+1})-V_1(q_k)\\le -\\|q_{k+1}-q_k\\|^2+2\\sigma\\lambda(q_{k+1}-q_k)^\\top(q_{k+1}-q_k)-2\\sigma(1-\\lambda)(q_{k+1}-p)^\\top(\\psi(z_k+q_k-p)-z^*)-2\\sigma(Aq_{k+1})^\\top(y_k-y^*+Aq_k)'},
  {type:'para', text:'并且对偶变量更新满足：'},
  {type:'formula', latex:'V_2(y_{k+1})-V_2(y_k)=2(Aq_{k+1})^\\top(y_k-y^*+Aq_k)+\\|A(q_{k+1}-q_k)\\|^2-\\|Aq_k\\|^2'},
  {type:'para', text:'次梯度项满足：'},
  {type:'formula', latex:'V_3(z_{k+1})-V_3(z_k)\\le -\\|z_{k+1}-z_k\\|^2+2(q_{k+1}-p)^\\top(z_{k+1}-z^*)'},
  {type:'para', text:'综合上述不等式可知 Lyapunov 函数 V(q_k,y_k,z_k) 沿系统轨迹非增。根据离散时间系统的 LaSalle 不变原理，并参照 [10] 的证明，可严格建立算法的全局收敛性。求解得到最优解后，机器人采用下一节介绍的 RVO 算法移动到目标位置。'},

  {type:'h1', text:'V 内部障碍物避让'},
  {type:'para', text:'在多机器人编队控制中，机器人间碰撞避免至关重要。内部避碰基于文献 [18] 的 RVO 方法实现。对速度分别为 v_i(t)、v_j(t) 的机器人 i 与 j，j 对 i 的 RVO 定义为：'},
  {type:'formula', latex:'RVO_{i\\mid j}(v_i(t),v_j(t))=\\{v_i\\\'(t)\\mid 2v_i\\\'(t)-v_i(t)\\in VO_{i\\mid j}(v_j(t))\\}'},
  {type:'para', text:'其中 VO_{i|j}(v_j(t)) 表示在假设 v_j(t) 恒定时，会导致 i 与 j 碰撞的速度集合。RVO 集合中的速度是当前速度与由 VO 导出的速度之间的加权平均，从而实现互易避碰。'},
  {type:'para', text:'在多机器人系统中，每个机器人先计算其期望速度 v_pref,i(t)，并检查是否与其他机器人 RVO 集发生冲突。若存在冲突，则通过如下优化选择速度，在避免所有 RVO 集的同时最小化偏离 v_pref,i(t)：'},
  {type:'formula', latex:'v_i(t)=\\arg\\min_{v\\in G_i(t)\\setminus O_i(t)}\\|v-v_{\\mathrm{pref},i}(t)\\|'},
  {type:'para', text:'其中 G_i(t) 为在运动学与动力学约束下可达的速度集合，O_i(t) 为其他机器人及静态障碍物产生的所有速度障碍的并集。若完全无碰撞的速度不存在，即 G_i(t)\\O_i(t)=∅，则使用碰撞时间 t_col(v,t) 作为惩罚项，选择次优速度：'},
  {type:'formula', latex:'v_i(t)=\\arg\\min_{v\\in G_i(t)}\\left(\\frac{\\beta}{t_{\\mathrm{col}}(v,t)}+\\|v-v_{\\mathrm{pref},i}(t)\\|\\right)'},
  {type:'para', text:'其中 β>0 用于权衡安全性与跟踪性能。'},

  {type:'h2', text:'算法1 最优编队导航算法'},
  {type:'para', text:'初始化：'},
  {type:'para', text:'1) 设置起点 B、目标点 T0、参考形状 S 与步长 σ。'},
  {type:'para', text:'2) 计算 A 与 σ。'},
  {type:'para', text:'3) 根据式 (1) 与 (2) 的增强型 A* 初始化全局路径 P。'},
  {type:'para', text:'迭代：'},
  {type:'para', text:'4) 获取第一个目标 T=T1。'},
  {type:'para', text:'5) 当当前位置 P ≠ T0 时：'},
  {type:'para', text:'6) 对 k=1:最大迭代次数：'},
  {type:'para', text:'7) 依据式 (11) 迭代得到最优航点 Q*。'},
  {type:'para', text:'8) 结束 for。'},
  {type:'para', text:'9) 将 P 更新为 Q*。'},
  {type:'para', text:'10) 若 Q*=T：'},
  {type:'para', text:'11) 将 T 设为下一个目标 T_i。'},
  {type:'para', text:'12) 否则：'},
  {type:'para', text:'13) 在 T 前插入 Q* 更新 P。'},
  {type:'para', text:'14) 结束 if。'},
  {type:'para', text:'15) 结束 while。'},
  {type:'para', text:'16) 返回更新后的整条路径 P̃。'},

        break;
      case 'h3':
        html += `<div class="dh3" contenteditable="true">${esc(item.text)}</div>`;
        break;

        html += `<div class="dp" contenteditable="true">${esc(item.text)}</div>`;
        break;
      case 'kw':
        html += `<div class="dkw" contenteditable="true">${esc(item.text)}</div>`;

        const num = item.num || '';
        html += `<div class="df-wrap">

      case 'img': {

}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

  set('--h3-weight',  document.querySelector('.tpl.active') ? (TEMPLATES[document.querySelector('.tpl.active').dataset.tpl]?.h3weight || 'bold') : 'bold');
  set('--h3-align',   document.getElementById('s-h3align').value);
  const activeTpl = document.querySelector('.tpl.active');
  const tpl = activeTpl ? TEMPLATES[activeTpl.dataset.tpl] : null;
  if (tpl) {
    if (tpl.coverTitleFont) set('--cover-title-font', tpl.coverTitleFont);
    if (tpl.coverTitleSize) set('--cover-title-size', tpl.coverTitleSize);
    if (tpl.coverTitleAlign) set('--cover-title-align', tpl.coverTitleAlign);
    if (tpl.coverMetaFont) set('--cover-meta-font', tpl.coverMetaFont);
    if (tpl.coverMetaSize) set('--cover-meta-size', tpl.coverMetaSize);
    if (tpl.coverBioFont) set('--cover-bio-font', tpl.coverBioFont);
    if (tpl.coverBioSize) set('--cover-bio-size', tpl.coverBioSize);
  }
  onPageDecorChange();
}

function getPageDecorSettings() {
  return {
    headerText: (document.getElementById('s-header-text')?.value || '').trim() || '东南大学本科生创新训练计划项目',
    headerAlign: document.getElementById('s-header-align')?.value || 'left',
    pageNumPosition: document.getElementById('s-page-num-position')?.value || 'header-right',
    pageNumFormat: document.getElementById('s-page-num-format')?.value || 'cnN'
  };
}

function formatPageLabel(page, total, fmt) {
  switch (fmt) {
    case 'n': return `${page}`;
    case 'nN': return `${page} / ${total}`;
    case 'cn': return `第 ${page} 页`;
    case 'cnN':
    default: return `第 ${page} 页 / 共 ${total} 页`;
  }
}

function applyPageDecorSettings() {
  const cfg = getPageDecorSettings();
  const spans = {
    left:   document.getElementById('pg-hdr-left'),
    center: document.getElementById('pg-hdr-center'),
    right:  document.getElementById('pg-hdr-right')
  };
  for (const s of Object.values(spans)) { if (s) s.textContent = ''; }
  if (cfg.headerAlign !== 'none' && spans[cfg.headerAlign]) {
    spans[cfg.headerAlign].textContent = cfg.headerText;
  }
  const pos = cfg.pageNumPosition;
  if (pos !== 'none' && pos.startsWith('header-')) {
    const side = pos.replace('header-', '');
    if (spans[side]) spans[side].textContent = formatPageLabel(1, 1, cfg.pageNumFormat);
  }
}

function updatePageDecorConflicts() {
  const alignSel = document.getElementById('s-header-align');
  const posSel   = document.getElementById('s-page-num-position');
  if (!alignSel || !posSel) return;
  const headerAlign = alignSel.value;
  const pageNumPos  = posSel.value;
  const alignToPos = { left: 'header-left', center: 'header-center', right: 'header-right' };
  const posToAlign = { 'header-left': 'left', 'header-center': 'center', 'header-right': 'right' };
  for (const opt of posSel.options)   opt.disabled = false;
  for (const opt of alignSel.options) opt.disabled = false;
  if (headerAlign !== 'none' && alignToPos[headerAlign]) {
    const conflict = alignToPos[headerAlign];
    for (const opt of posSel.options) {
      if (opt.value === conflict) {
        opt.disabled = true;
        if (pageNumPos === conflict) posSel.value = 'none';
        break;
      }
    }
  }
  if (posToAlign[pageNumPos]) {
    const conflict = posToAlign[pageNumPos];
    for (const opt of alignSel.options) {
      if (opt.value === conflict) {
        opt.disabled = true;
        if (headerAlign === conflict) alignSel.value = 'none';
        break;
      }
    }
  }
}

function onPageDecorChange() {
  updatePageDecorConflicts();
  applyPageDecorSettings();
}

function loadTemplate(el) {
  document.querySelectorAll('.tpl').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  const t = TEMPLATES[el.dataset.tpl];
  if (!t) return;
  const pg = document.getElementById('document-page');
  const set = (k,v) => pg.style.setProperty(k, v);
  setSelect('s-bfont',  t.bfont);
  setSelect('s-bsize',  t.bsize);
  setSelect('s-blh',    t.blh);
  if (t.h0font)  set('--h0-font', t.h0font);
  if (t.h0size)  set('--h0-size', t.h0size);
  if (t.h0weight) set('--h0-weight', t.h0weight);
  if (t.h0align) set('--h0-align', t.h0align);
  setSelect('s-h1font', t.h1font);
  setSelect('s-h1size', t.h1size);
  setSelect('s-h1align',t.h1align);
  setSelect('s-h2font', t.h2font);
  setSelect('s-h2size', t.h2size);
  setSelect('s-h2align',t.h2align);
  setSelect('s-h3size', t.h3size);
  setSelect('s-h3align',t.h3align);
  if (t.pageTop) set('--page-top', t.pageTop);
  if (t.pageRight) set('--page-right', t.pageRight);
  if (t.pageBottom) set('--page-bottom', t.pageBottom);
  if (t.pageLeft) set('--page-left', t.pageLeft);
  if (t.pageGutter) set('--page-gutter', t.pageGutter);
  if (t.pageDecor) {
    const headerText = document.getElementById('s-header-text');
    const headerAlign = document.getElementById('s-header-align');
    const pageNumPosition = document.getElementById('s-page-num-position');
    const pageNumFormat = document.getElementById('s-page-num-format');
    if (headerText && 'headerText' in t.pageDecor) headerText.value = t.pageDecor.headerText;
    if (headerAlign && 'headerAlign' in t.pageDecor) headerAlign.value = t.pageDecor.headerAlign;
    if (pageNumPosition && 'pageNumPosition' in t.pageDecor) pageNumPosition.value = t.pageDecor.pageNumPosition;
    if (pageNumFormat && 'pageNumFormat' in t.pageDecor) pageNumFormat.value = t.pageDecor.pageNumFormat;
  }
  // Always reset cover vars on template switch to avoid carrying over previous template values.
  // Defaults fall back to the template's main typography (h1/body).
  set('--cover-title-font',  t.coverTitleFont  || t.h1font || document.getElementById('s-h1font').value);
  set('--cover-title-size',  t.coverTitleSize  || t.h1size || document.getElementById('s-h1size').value);
  set('--cover-title-align', t.coverTitleAlign || t.h1align || document.getElementById('s-h1align').value);
  set('--cover-meta-font',   t.coverMetaFont   || t.bfont || document.getElementById('s-bfont').value);
  set('--cover-meta-size',   t.coverMetaSize   || t.bsize || document.getElementById('s-bsize').value);
  set('--cover-bio-font',    t.coverBioFont    || t.bfont || document.getElementById('s-bfont').value);
  set('--cover-bio-size',    t.coverBioSize    || t.bsize || document.getElementById('s-bsize').value);
  applyStyles();
}

function setSelect(id, val) {
  const el = document.getElementById(id);
  for (const opt of el.options) {
    if (opt.value === val) { el.value = val; return; }
  }
  // If exact match not found, add and select
  const opt = document.createElement('option');
  opt.value = val; opt.textContent = val;
  el.appendChild(opt);
  el.value = val;
}

/* ============================================================
   NOTIFICATION
   ============================================================ */
let notifTimer = null;
function notify(msg, duration=2500) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(()=>el.classList.remove('show'), duration);
}

/* ============================================================
   DOCX EXPORT  –  uses docx.js with Math equation objects
   Formulas are rendered as proper Word equation (OMML) objects
   via docx.js Math API
   ============================================================ */
async function exportToDocx() {
  notify('⏳ 正在生成 DOCX（含Word公式）…', 12000);
  await new Promise(r=>setTimeout(r, 50));
  readCoverFromDOM();

  // ── wait up to 15 s for docx.js and FileSaver to load ──
  const waitLib = (check, label, ms=15000) => new Promise((res, rej) => {
    if (check()) { res(); return; }
    const start = Date.now();
    const t = setInterval(() => {
      if (check()) { clearInterval(t); res(); }
      else if (Date.now()-start > ms) {
        clearInterval(t);
        rej(new Error(`${label} 加载超时，请检查网络连接后刷新页面重试`));
      }
    }, 200);
  });

  try {
    await waitLib(
      () => !!(window.docx && window.docx.Document),
      'docx.js'
    );
    await waitLib(
      () => typeof saveAs === 'function',
      'FileSaver'
    );
  } catch(waitErr) {
    notify('❌ ' + waitErr.message, 8000);
    return;
  }

  try {
    const D = window.docx;
    const srcCS = getComputedStyle(document.getElementById('document-page'));

    // ── current style settings ──
    const h0FontName   = getDocxFontName(srcCS.getPropertyValue('--h0-font').trim() || document.getElementById('s-bfont').value);
    const h0Size       = ptToHalfPt(srcCS.getPropertyValue('--h0-size').trim() || document.getElementById('s-bsize').value);
    const h0AlignValue = srcCS.getPropertyValue('--h0-align').trim();
    const h0Align      = h0AlignValue === 'left'
                           ? D.AlignmentType.LEFT
                           : h0AlignValue === 'right'
                             ? D.AlignmentType.RIGHT
                             : D.AlignmentType.CENTER;
    const bodyFontName = getDocxFontName(document.getElementById('s-bfont').value);
    const bodySize     = ptToHalfPt(document.getElementById('s-bsize').value);
    const bodyLh       = parseFloat(document.getElementById('s-blh').value);
    const h1FontName   = getDocxFontName(document.getElementById('s-h1font').value);
    const h1Size       = ptToHalfPt(document.getElementById('s-h1size').value);
    const h1Align      = document.getElementById('s-h1align').value === 'center'
                           ? D.AlignmentType.CENTER : D.AlignmentType.LEFT;
    const h2FontName   = getDocxFontName(document.getElementById('s-h2font').value);
    const h2Size       = ptToHalfPt(document.getElementById('s-h2size').value);
    const h2Align      = document.getElementById('s-h2align').value === 'center'
                           ? D.AlignmentType.CENTER : D.AlignmentType.LEFT;

    // Line spacing in twips (1pt = 20 twips)
    const bodyLhTwips  = Math.round(bodyLh * bodySize/2 * 20);

    function bodyPPr(indent2em) {
      return {
        spacing: { line: bodyLhTwips, lineRule: D.LineRuleType ? D.LineRuleType.AUTO : 'auto' },
        indent: indent2em ? { firstLine: bodySize * 20 } : undefined
      };
    }

    // ── paragraph factories ──
    function mkPara(text) {
      return new D.Paragraph({
        children: [new D.TextRun({ text, font: bodyFontName, size: bodySize })],
        spacing: { line: bodyLhTwips },
        indent: { firstLine: bodySize * 20 }
      });
    }

    function mkH1(text, breakPage = false) {
      return new D.Paragraph({
        children: [new D.TextRun({ text, font: h1FontName, size: h1Size, bold: true })],
        alignment: h1Align,
        spacing: { before: 480, after: 240 },
        ...(breakPage ? { pageBreakBefore: true } : {})
      });
    }

    function mkH2(text) {
      return new D.Paragraph({
        children: [new D.TextRun({ text, font: h2FontName, size: h2Size, bold: true })],
        alignment: h2Align,
        spacing: { before: 280, after: 120 }
      });
    }

    function mkRef(text) {
      return new D.Paragraph({
        children: [new D.TextRun({ text, font: bodyFontName, size: bodySize })],
        spacing: { line: bodyLhTwips },
        indent: { left: bodySize * 20, hanging: bodySize * 20 }
      });
    }

    function mkH0(text) {
      return new D.Paragraph({
        children: [new D.TextRun({ text, font: h0FontName, size: h0Size, bold: true })],
        alignment: h0Align,
        spacing: { before: 180, after: 120 }
      });
    }

    // ── LaTeX → OMML conversion via KaTeX MathML ──────────────

    // Map KaTeX accent characters → OMML combining characters
    const ACCENT_MAP = {
      '\u007e': '\u0303', // ~ tilde           → U+0303 COMBINING TILDE
      '\u005e': '\u0302', // ^ circumflex       → U+0302 COMBINING CIRCUMFLEX ACCENT
      '\u02c9': '\u0304', // ˉ modifier macron  → U+0304 COMBINING MACRON
      '\u00af': '\u0304', // ¯ macron           → U+0304
      '\u0305': '\u0305', // combining overline → keep as-is
      '\u02d9': '\u0307', // ˙ dot above        → U+0307 COMBINING DOT ABOVE
      '\u00a8': '\u0308', // ¨ diaeresis        → U+0308 COMBINING DIAERESIS
      '\u0060': '\u0300', // ` grave            → U+0300 COMBINING GRAVE ACCENT
      '\u00b4': '\u0301', // ´ acute            → U+0301 COMBINING ACUTE ACCENT
      '\u02d8': '\u0306', // ˘ breve            → U+0306 COMBINING BREVE
      '\u02c7': '\u030c', // ˇ caron            → U+030C COMBINING CARON
      '\u2192': '\u20d7', // → right arrow      → U+20D7 COMBINING RIGHT ARROW ABOVE
      '\u20d7': '\u20d7', // combining arrow    → keep as-is
    };

    /** True when an element node is a fence <mo> (from \left, \right, \middle). */
    function isFenceMo(el) {
      if (!el || el.nodeType !== Node.ELEMENT_NODE) return false;
      const tag = el.tagName.toLowerCase().replace(/^[a-z0-9]+:/, '');
      return tag === 'mo' && el.getAttribute('fence') === 'true';
    }

    /** All childNodes of `parent` strictly between `startEl` and `endEl`. */
    function nodesBetween(parent, startEl, endEl) {
      const all = Array.from(parent.childNodes);
      const a = all.indexOf(startEl), b = all.indexOf(endEl);
      return (a >= 0 && b > a) ? all.slice(a + 1, b) : [];
    }

    /**
     * Build an OMML accent element <m:acc> for a KaTeX <mover accent="true"> node.
     * Uses D.XmlComponent + D.MathAccentCharacter + D.MathBase (all exported by docx 8.x).
     */
    function buildAccent(accentChar, baseChildren) {
      try {
        const ommlChar = ACCENT_MAP[accentChar] || accentChar;
        const acc   = new D.XmlComponent('m:acc');
        const accPr = new D.XmlComponent('m:accPr');
        // U+0302 (^) is the OMML default accent per ECMA-376 §22.1.2.5 (m:accPr/m:chr)
        // — omit chr element to keep the default (hat) so Word renders it correctly
        if (ommlChar !== '\u0302') {
          accPr.root.push(new D.MathAccentCharacter(ommlChar));
        }
        if (accPr.root.length) acc.root.push(accPr);
        acc.root.push(new D.MathBase(baseChildren));
        return acc;
      } catch(e) {
        console.warn('buildAccent failed, falling back to superscript:', e);
        return new D.MathSuperScript({ children: baseChildren, superScript: [new D.MathRun(accentChar)] });
      }
    }

    /**
     * Build an OMML <m:d> delimiter element.
     * `parts` is an array of OMML-element arrays (one per separator-delimited section).
     * OMML defaults: begChr=(  endChr=)  sepChr=|
     */
    function mkDelimiter(begChar, sepChar, endChar, parts) {
      // Use docx.js bracket classes for common single-part cases (no separator)
      if (parts.length === 1 && sepChar === null) {
        const c = parts[0];
        if (begChar === '(' && endChar === ')') return new D.MathRoundBrackets({ children: c });
        if (begChar === '[' && endChar === ']') return new D.MathSquareBrackets({ children: c });
        if (begChar === '{' && endChar === '}') return new D.MathCurlyBrackets({ children: c });
      }

      // General case: build raw <m:d> with explicit dPr
      const d   = new D.XmlComponent('m:d');
      const dPr = new D.XmlComponent('m:dPr');

      if (begChar !== '(') {
        const e = new D.XmlComponent('m:begChr');
        e.root.push({ _attr: { 'm:val': begChar } });
        dPr.root.push(e);
      }
      if (sepChar !== null && sepChar !== '|') {
        const e = new D.XmlComponent('m:sepChr');
        e.root.push({ _attr: { 'm:val': sepChar } });
        dPr.root.push(e);
      }
      if (endChar !== ')') {
        const e = new D.XmlComponent('m:endChr');
        e.root.push({ _attr: { 'm:val': endChar } });
        dPr.root.push(e);
      }
      if (dPr.root.length) d.root.push(dPr);
      for (const p of parts) d.root.push(new D.MathBase(p));
      return d;
    }

    /**
     * Build an OMML <m:eqArr> equation-array element.
     * `rowContents` is an array of OMML-element arrays, one per row.
     * Used for \begin{cases}, \begin{aligned}, \begin{align}, etc.
     */
    function buildEqArr(rowContents) {
      const eqArr = new D.XmlComponent('m:eqArr');
      for (const rowContent of rowContents) {
        const e = new D.XmlComponent('m:e');
        e.root.push(...rowContent);
        eqArr.root.push(e);
      }
      return eqArr;
    }

    /**
     * Build an OMML <m:m> matrix element.
     * `rows2d` is an array of rows; each row is an array of cell OMML-element arrays.
     * Used for \begin{pmatrix}, \begin{bmatrix}, etc. (multi-column tables inside fences).
     */
    function buildMatrix(rows2d) {
      const m = new D.XmlComponent('m:m');
      for (const cells of rows2d) {
        const mr = new D.XmlComponent('m:mr');
        for (const cell of cells) {
          const e = new D.XmlComponent('m:e');
          e.root.push(...cell);
          mr.root.push(e);
        }
        m.root.push(mr);
      }
      return m;
    }

    /**
     * Detect fenced <mrow> (from \left...\right) and build a proper OMML delimiter.
     * Returns null if the mrow is not a fenced expression.
     */
    function tryFencedMrow(node) {
      const childEls = Array.from(node.children);
      if (childEls.length < 2) return null;
      if (!isFenceMo(childEls[0]) || !isFenceMo(childEls[childEls.length - 1])) return null;

      const begChar = childEls[0].textContent;
      const endChar = childEls[childEls.length - 1].textContent;

      // Middle fence elements (from \middle) become separators
      const innerEls = childEls.slice(1, -1);
      const middleFences = innerEls.filter(isFenceMo);
      const innerNodes  = nodesBetween(node, childEls[0], childEls[childEls.length - 1]);

      if (middleFences.length === 0) {
        // Detect single inner <mtable> → route to eqArr or matrix
        const innerEls = innerNodes.filter(n => n.nodeType === Node.ELEMENT_NODE);
        if (innerEls.length === 1) {
          const innerTag = innerEls[0].tagName.toLowerCase().replace(/^[a-z0-9]+:/, '');
          if (innerTag === 'mtable') {
            const mtbl = innerEls[0];
            // Convert each <mtd> cell to OMML
            const rows2d = Array.from(mtbl.children).map(mtr =>
              Array.from(mtr.children).map(mtd => {
                const out = [];
                for (const c of mtd.childNodes) out.push(...mathmlNodeToOmml(c));
                return out;
              })
            );
            const maxCols = rows2d.length > 0 ? Math.max(...rows2d.map(r => r.length)) : 1;
            // Multi-column table inside ( or [ → proper OMML matrix
            const isMatrixFence = '(['.includes(begChar) && '([)\\u2016'.includes(endChar);
            if (maxCols > 1 && isMatrixFence) {
              return mkDelimiter(begChar, null, endChar, [[buildMatrix(rows2d)]]);
            } else {
              // cases / aligned / etc. → eqArr inside delimiter
              const rowContents = rows2d.map(r => r.flat());
              return mkDelimiter(begChar, null, endChar, [[buildEqArr(rowContents)]]);
            }
          }
        }
        // No special table: standard content inside delimiter
        const content = innerNodes.flatMap(n => mathmlNodeToOmml(n));
        return mkDelimiter(begChar, null, endChar, [content]);
      }

      // Split inner content at each middle fence
      const parts = [];
      let current = [];
      for (const n of innerNodes) {
        if (n.nodeType === Node.ELEMENT_NODE && isFenceMo(n) && middleFences.includes(n)) {
          parts.push(current);
          current = [];
        } else {
          current.push(...mathmlNodeToOmml(n));
        }
      }
      parts.push(current);

      const sepChar = middleFences[0].textContent;
      return mkDelimiter(begChar, sepChar, endChar, parts);
    }

    /**
     * Recursively convert a MathML DOM node to an array of docx OMML elements.
     */
    function mathmlNodeToOmml(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent;
        if (!text.trim()) return [];
        return [new D.MathRun(text)];
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return [];

      // Strip namespace prefix (e.g. "m:mrow" → "mrow")
      const tag = node.tagName.toLowerCase().replace(/^[a-z0-9]+:/, '');

      const childOmml = (el) => {
        const out = [];
        for (const c of el.childNodes) out.push(...mathmlNodeToOmml(c));
        return out;
      };
      const nth = (n) => node.children[n] ? childOmml(node.children[n]) : [];

      switch (tag) {
        case 'math':
        case 'mstyle':
        case 'mpadded':
        case 'merror':
        case 'mphantom':
          return childOmml(node);

        case 'mrow': {
          const fenced = tryFencedMrow(node);
          if (fenced) return [fenced];
          return childOmml(node);
        }

        case 'mfenced': {
          // Handle deprecated <mfenced> (not produced by KaTeX 0.16 but may appear elsewhere)
          const open = node.getAttribute('open') ?? '(';
          const close = node.getAttribute('close') ?? ')';
          const seps  = node.getAttribute('separators') ?? ',';
          const sep   = seps[0] ?? null;
          return [mkDelimiter(open, sep, close, [childOmml(node)])];
        }

        case 'semantics':
          // Delegate to mathmlNodeToOmml (not childOmml) so that mrow/fence detection runs
          return node.children[0] ? mathmlNodeToOmml(node.children[0]) : [];

        case 'annotation':
        case 'annotation-xml':
          return [];

        case 'mi':
        case 'mn':
        case 'mo':
        case 'mtext':
          return node.textContent ? [new D.MathRun(node.textContent)] : [];

        case 'mspace':
          return [new D.MathRun('\u00a0')];

        case 'mfrac':
          return [new D.MathFraction({ numerator: nth(0), denominator: nth(1) })];

        case 'msqrt':
          try { return [new D.MathRadical({ children: childOmml(node) })] }
          catch(e) { return [new D.MathRun('√('), ...childOmml(node), new D.MathRun(')')]; }

        case 'mroot':
          try { return [new D.MathRadical({ children: nth(0), degree: nth(1) })]; }
          catch(e) { return [...nth(1), new D.MathRun('√('), ...nth(0), new D.MathRun(')')]; }

        case 'msub':
          return [new D.MathSubScript({ children: nth(0), subScript: nth(1) })];

        case 'msup':
          return [new D.MathSuperScript({ children: nth(0), superScript: nth(1) })];

        case 'msubsup':
          return [new D.MathSubSuperScript({ children: nth(0), subScript: nth(1), superScript: nth(2) })];

        case 'mover': {
          // accent="true" marks diacritic accents (\widetilde, \hat, \bar, …)
          if (node.getAttribute('accent') === 'true') {
            const accentChar = node.children[1]?.textContent ?? '';
            return [buildAccent(accentChar, nth(0))];
          }
          // Non-accent mover: treat as superscript (limit notation, etc.)
          return [new D.MathSuperScript({ children: nth(0), superScript: nth(1) })];
        }

        case 'munder': {
          if (node.getAttribute('accentunder') === 'true') {
            // Underaccent — approximate as subscript
            return [new D.MathSubScript({ children: nth(0), subScript: nth(1) })];
          }
          return [new D.MathSubScript({ children: nth(0), subScript: nth(1) })];
        }

        case 'munderover':
          return [new D.MathSubSuperScript({ children: nth(0), subScript: nth(1), superScript: nth(2) })];

        case 'mtable': {
          // Standalone <mtable> (e.g. \begin{aligned}, \begin{align}, \begin{gather}).
          // Tables inside fences (\begin{cases}, \begin{pmatrix}, etc.) are handled
          // in tryFencedMrow before this code is reached.
          const rows2d = Array.from(node.children).map(mtr =>
            Array.from(mtr.children).map(mtd => {
              const out = [];
              for (const c of mtd.childNodes) out.push(...mathmlNodeToOmml(c));
              return out;
            })
          );
          if (rows2d.length === 0) return [];
          // Concatenate cells within each row (handles multi-column align environments)
          const rowContents = rows2d.map(r => r.flat());
          return [buildEqArr(rowContents)];
        }

        case 'mtr':
        case 'mtd':
        case 'mlabeledtr':
        case 'menclose':
        case 'mmultiscripts':
        default:
          return childOmml(node);
      }
    }

    /**
     * Convert a LaTeX string to an array of docx OMML math elements.
     * Uses KaTeX for reliable parsing; falls back to a plain MathRun if KaTeX is unavailable.
     */
    function latexToOmml(latex) {
      try {
        if (!window.katex) return [new D.MathRun(latex)];
        const html = katex.renderToString(latex, { output: 'mathml', throwOnError: false });
        const div = document.createElement('div');
        div.innerHTML = html;
        const mathEl = div.querySelector('math');
        if (!mathEl) return [new D.MathRun(latex)];
        return mathmlNodeToOmml(mathEl);
      } catch(e) {
        console.warn('latexToOmml failed:', latex, e);
        return [new D.MathRun(latex)];
      }
    }

    function mathPara(mathChildren, num) {
      const children = [new D.Math({ children: mathChildren })];
      if (num) {
        children.push(new D.TextRun({ text: '      ' + num, font: bodyFontName, size: bodySize }));
      }
      return new D.Paragraph({
        children,
        alignment: D.AlignmentType.CENTER,
        spacing: { before: 180, after: 180 }
      });
    }

    /** Build a centred display-math paragraph from a LaTeX string. */
    function buildMathForLatex(latex, num) {
      return mathPara(latexToOmml(latex), num);
    }

    /**
     * Split a paragraph text string into alternating plain-text / inline-math segments.
     * Handles $$...$$ (display, treated as inline) and $...$ markers.
     */
    function parseMathSegments(text) {
      const segs = [];
      let i = 0;
      while (i < text.length) {
        if (text[i] === '$' && text[i + 1] === '$') {
          const end = text.indexOf('$$', i + 2);
          if (end !== -1) { segs.push({ math: true, s: text.slice(i + 2, end) }); i = end + 2; continue; }
        }
        if (text[i] === '$') {
          const end = text.indexOf('$', i + 1);
          if (end !== -1) { segs.push({ math: true, s: text.slice(i + 1, end) }); i = end + 1; continue; }
        }
        const next$ = text.indexOf('$', i);
        const chunk = next$ === -1 ? text.slice(i) : text.slice(i, next$);
        if (chunk) segs.push({ math: false, s: chunk });
        if (next$ === -1) break;
        i = next$;
      }
      return segs;
    }

    /**
     * Build a body paragraph whose text may contain inline LaTeX ($...$).
     * Math spans are converted to Word OMML; plain text becomes TextRun.
     */
    function mkParaWithMath(text) {
      const segs = parseMathSegments(text);
      const children = [];
      for (const seg of segs) {
        if (seg.math) {
          const omml = latexToOmml(seg.s);
          if (omml.length) children.push(new D.Math({ children: omml }));
        } else {
          if (seg.s) children.push(new D.TextRun({ text: seg.s, font: bodyFontName, size: bodySize }));
        }
      }
      return new D.Paragraph({
        children,
        spacing: { line: bodyLhTwips },
        indent: { firstLine: bodySize * 20 }
      });
    }

    /**
     * Convert an image source (data URL, plain base64, or URL) to a Uint8Array
     * suitable for docx.js ImageRun. Returns null when src is empty.
     */
    async function b64ToUint8(src) {
      if (!src) return null;
      const isDataUrl = src.startsWith('data:');
      const isUrl = /^[a-z][a-z0-9+.-]*:/i.test(src) || src.startsWith('//');
      if (isDataUrl || !isUrl) {
        const b64 = src.includes(',') ? src.split(',')[1] : src;
        const bin = atob(b64);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        return arr;
      }
      const response = await fetch(src);
      if (!response.ok) throw new Error(`Image fetch failed for ${src}: ${response.status} ${response.statusText}`);
      const buf = await response.arrayBuffer();
      return new Uint8Array(buf);
    }

    /**
     * Build a centred paragraph containing an image from a data-URL.
     * widthPt / heightPt are in points (1pt = 12700 EMU in docx.js).
     * caption is an optional string placed below the image.
     */
    async function buildImagePara(src, widthPt, heightPt, caption) {
      try {
        const imgData = await b64ToUint8(src);
        if (!imgData) return [];
        const imageRun = new D.ImageRun({
          data: imgData,
          transformation: { width: widthPt, height: heightPt }
        });
        const imgPara = new D.Paragraph({
          children: [imageRun],
          alignment: D.AlignmentType.CENTER,
          spacing: { before: 120, after: caption ? 60 : 180 }
        });
        if (!caption) return [imgPara];
        const capPara = new D.Paragraph({
          children: [new D.TextRun({ text: caption, font: bodyFontName, size: bodySize, italics: true })],
          alignment: D.AlignmentType.CENTER,
          spacing: { after: 180 }
        });
        return [imgPara, capPara];
      } catch (error) {
        console.warn('Image load failed:', src, error?.message || error);
        const fallbackText = caption ? `${caption} (图片加载失败)` : '图片加载失败';
        return [new D.Paragraph({
          children: [new D.TextRun({ text: fallbackText, font: bodyFontName, size: bodySize, italics: true })],
          alignment: D.AlignmentType.CENTER,
          spacing: { before: 120, after: 180 }
        })];
      }
    }

    // ── traverse DOM to build docx children ──
    const docChildren = [];

    // Cover (from editable preview fields; DO NOT hardcode a fixed template here)
    const coverTitleFontName = getDocxFontName(srcCS.getPropertyValue('--cover-title-font').trim() || document.getElementById('s-h1font').value);
    const coverTitleSize = ptToHalfPt(srcCS.getPropertyValue('--cover-title-size').trim() || document.getElementById('s-h1size').value);
    const coverMetaSize = ptToHalfPt(srcCS.getPropertyValue('--cover-meta-size').trim() || document.getElementById('s-bsize').value);
    const coverBioSize = ptToHalfPt(srcCS.getPropertyValue('--cover-bio-size').trim() || document.getElementById('s-bsize').value);
    const coverTitleAlignValue = (srcCS.getPropertyValue('--cover-title-align').trim() || 'center');
    const coverTitleAlign = coverTitleAlignValue === 'left'
                              ? D.AlignmentType.LEFT
                              : coverTitleAlignValue === 'right'
                                ? D.AlignmentType.RIGHT
                                : D.AlignmentType.CENTER;

    const coverTitle = (COVER.title || '').trim();
    const coverSchool = (COVER.schoolName || '').trim();
    const coverAdvisor = (COVER.advisor || '').trim();
    const coverAbstract = (COVER.abstract || '').trim();
    const coverKeywords = (COVER.keywords || '').trim();
    const coverBio = (COVER.authorBio || '').trim();
    const coverAuthors = Array.isArray(COVER.authors) ? COVER.authors : [];
    const authorNames = coverAuthors.map(a => (a?.name || '').trim()).filter(Boolean);

    if (coverTitle) {
      docChildren.push(new D.Paragraph({
        children: [new D.TextRun({ text: coverTitle, font: coverTitleFontName, size: coverTitleSize, bold: true })],
        alignment: coverTitleAlign,
        spacing: { before: 0, after: 240 }
      }));
    }

    // "学校名称  作者1，作者2" line (format from 学术报告会要求; supports N authors)
    const metaLine = [coverSchool, authorNames.join('，')].filter(Boolean).join('  ');
    if (metaLine) {
      docChildren.push(new D.Paragraph({
        children: [new D.TextRun({ text: metaLine, font: bodyFontName, size: coverMetaSize })],
        alignment: D.AlignmentType.CENTER,
        spacing: { after: 120 }
      }));
    }

    // Author affiliations (one line per author to avoid hardcoding a limit)
    for (let i = 0; i < coverAuthors.length; i++) {
      const a = coverAuthors[i] || {};
      const name = (a.name || '').trim();
      const aff = (a.affiliation || '').trim();
      const pc = (a.postcode || '').trim();
      const note = (a.note || '').trim();
      const parts = [];
      if (aff) parts.push(aff);
      if (pc) parts.push(pc);
      if (note) parts.push(note);
      const line = parts.join('，');
      if (!name && !line) continue;
      const text = line ? `（${i + 1}．${line}）` : `（${i + 1}．${name}）`;
      docChildren.push(new D.Paragraph({
        children: [new D.TextRun({ text, font: bodyFontName, size: coverMetaSize })],
        alignment: D.AlignmentType.CENTER,
        spacing: { after: 60 }
      }));
    }

    if (coverAdvisor) {
      docChildren.push(new D.Paragraph({
        children: [new D.TextRun({ text: coverAdvisor, font: bodyFontName, size: coverMetaSize })],
        alignment: D.AlignmentType.CENTER,
        spacing: { after: 200 }
      }));
    }

    if (coverAbstract) {
      docChildren.push(new D.Paragraph({
        children: [
          new D.TextRun({ text: '摘 要：', font: bodyFontName, size: bodySize, bold: true }),
          new D.TextRun({ text: coverAbstract, font: bodyFontName, size: bodySize })
        ],
        spacing: { line: bodyLhTwips, after: 120 }
      }));
    }

    if (coverKeywords) {
      docChildren.push(new D.Paragraph({
        children: [
          new D.TextRun({ text: '关键词：', font: bodyFontName, size: bodySize, bold: true }),
          new D.TextRun({ text: coverKeywords, font: bodyFontName, size: bodySize })
        ],
        spacing: { line: bodyLhTwips, after: 200 }
      }));
    }

    if (coverBio) {
      docChildren.push(new D.Paragraph({
        children: [new D.TextRun({ text: coverBio, font: bodyFontName, size: coverBioSize })],
        spacing: { line: Math.round(1.35 * coverBioSize/2 * 20), before: 120, after: 240 }
      }));
    }

    // Start body on a new page after the cover
    docChildren.push(new D.Paragraph({ children: [], pageBreakBefore: true }));

    // Content paragraphs
    for (const item of CONTENT) {
      switch(item.type) {
        case 'h0':
          docChildren.push(mkH0(item.text));
          break;
        case 'h1':
          docChildren.push(mkH1(item.text, item.text === '参考文献'));
          break;
        case 'h2':
          docChildren.push(mkH2(item.text));
          break;
        case 'h3':
          docChildren.push(new D.Paragraph({
            children: [new D.TextRun({ text: item.text, font: bodyFontName, size: bodySize, bold: true })],
            spacing: { before: 200, after: 80 }
          }));
          break;
        case 'para':
          docChildren.push(mkParaWithMath(item.text));
          break;
        case 'kw':
          docChildren.push(new D.Paragraph({
            children: [new D.TextRun({ text: item.text, font: bodyFontName, size: bodySize })],
            spacing: { line: bodyLhTwips, before: 160 }
          }));
          break;
        case 'formula':
          docChildren.push(buildMathForLatex(item.latex, item.num || ''));
          break;
        case 'refs':
          for (const ref of item.items) {
            docChildren.push(mkRef(ref));
          }
          break;
        case 'img': {
          // img item: { type:'img', src: 'data:image/jpeg;base64,...', caption:'...', widthPt:440, heightPt:330 }
          const wPt = item.widthPt || 400;
          const hPt = item.heightPt || Math.round(wPt * 0.75);
          const paras = await buildImagePara(item.src, wPt, hPt, item.caption || '');
          docChildren.push(...paras);
          break;
        }
      }
    }

    const pageDecor = getPageDecorSettings();
    const hasTotalPage = !!(D.PageNumber && D.PageNumber.TOTAL_PAGES);
    function docxPageRuns() {
      if (!(D.PageNumber && D.PageNumber.CURRENT)) return [new D.TextRun({ text: '1', font: bodyFontName, size: 18 })];
      switch (pageDecor.pageNumFormat) {
        case 'n':
          return [new D.TextRun({ children: [D.PageNumber.CURRENT], font: bodyFontName, size: 18 })];
        case 'nN':
          return hasTotalPage
            ? [new D.TextRun({ children: [D.PageNumber.CURRENT, ' / ', D.PageNumber.TOTAL_PAGES], font: bodyFontName, size: 18 })]
            : [new D.TextRun({ children: [D.PageNumber.CURRENT], font: bodyFontName, size: 18 })];
        case 'cn':
          return [new D.TextRun({ children: ['第 ', D.PageNumber.CURRENT, ' 页'], font: bodyFontName, size: 18 })];
        case 'cnN':
        default:
          return hasTotalPage
            ? [new D.TextRun({ children: ['第 ', D.PageNumber.CURRENT, ' 页 / 共 ', D.PageNumber.TOTAL_PAGES, ' 页'], font: bodyFontName, size: 18 })]
            : [new D.TextRun({ children: ['第 ', D.PageNumber.CURRENT, ' 页'], font: bodyFontName, size: 18 })];
      }
    }
    const pageNumAlign = pageDecor.pageNumPosition.endsWith('center') ? D.AlignmentType.CENTER : D.AlignmentType.RIGHT;
    const pageNumPara = new D.Paragraph({ children: docxPageRuns(), alignment: pageNumAlign });
    const headerChildren = [];
    if (pageDecor.headerAlign !== 'none' && pageDecor.headerText) {
      headerChildren.push(new D.Paragraph({
        children: [new D.TextRun({ text: pageDecor.headerText, font: bodyFontName, size: 18 })],
        alignment: D.AlignmentType.CENTER,
        border: { bottom: { style: D.BorderStyle.SINGLE, size: 6, color: '999999', space: 1 } }
      }));
    }
    if (pageDecor.pageNumPosition.startsWith('header-')) headerChildren.push(pageNumPara);
    const headers = headerChildren.length ? {
      default: new D.Header({ children: headerChildren })
    } : undefined;
    const footers = pageDecor.pageNumPosition.startsWith('footer-')
      ? { default: new D.Footer({ children: [pageNumPara] }) }
      : undefined;

    const cmToTwips = (value, fallbackTwips) => {
      if (!value) return fallbackTwips;
      const m = String(value).trim().match(/^(-?\d+(?:\.\d+)?)(cm|mm|in|pt)$/i);
      if (!m) return fallbackTwips;
      const n = parseFloat(m[1]);
      const unit = m[2].toLowerCase();
      if (unit === 'cm') return Math.round(n * 1440 / 2.54);
      if (unit === 'mm') return Math.round(n * 1440 / 25.4);
      if (unit === 'in') return Math.round(n * 1440);
      if (unit === 'pt') return Math.round(n * 20);
      return fallbackTwips;
    };
    const pageMargins = {
      top: cmToTwips(srcCS.getPropertyValue('--page-top').trim(), 1134),
      bottom: cmToTwips(srcCS.getPropertyValue('--page-bottom').trim(), 1134),
      left: cmToTwips(srcCS.getPropertyValue('--page-left').trim(), 1417),
      right: cmToTwips(srcCS.getPropertyValue('--page-right').trim(), 1134),
      gutter: cmToTwips(srcCS.getPropertyValue('--page-gutter').trim(), 284)
    };

    // ── build Document ──
    const doc = new D.Document({
      styles: {
        paragraphStyles: []
      },
      sections: [{
        properties: {
          page: {
            margin: pageMargins
          }
        },
        ...(headers ? { headers } : {}),
        ...(footers ? { footers } : {}),
        children: docChildren
      }]
    });

    const blob = await D.Packer.toBlob(doc);
    saveAs(blob, '结项报告.docx');
    notify('✅ DOCX 下载成功！', 3000);

  } catch(err) {
    console.error('DOCX export error:', err);
    notify('❌ DOCX 生成失败：' + err.message, 5000);
  }
}

/** Convert CSS pt value string to half-points integer (docx unit) */
function ptToHalfPt(ptStr) {
  return Math.round(parseFloat(ptStr) * 2);
}

/** Extract the first font family name from a CSS font-family string */
function getDocxFontName(cssFontFamily) {
  const first = cssFontFamily.split(',')[0].trim().replace(/'/g,'').replace(/"/g,'');
  return first;
}

/** Strip LaTeX markup from inline math ($...$) for plain-text export */
function stripInlineMath(text) {
  return text
    .replace(/\$\$[^$]+\$\$/g, '[公式]')
    .replace(/\$[^$]+\$/g, s => {
      const inner = s.slice(1,-1);
      // Very rough LaTeX to unicode conversion for common symbols
      return inner
        .replace(/\\mathcal\{([A-Z])\}/g,'$1')
        .replace(/\\mathbb\{([A-Z])\}/g,'$1')
        .replace(/\\mathrm\{([^}]+)\}/g,'$1')
        .replace(/\\text\{([^}]+)\}/g,'$1')
        .replace(/\\le\b/g,'≤').replace(/\\ge\b/g,'≥')
        .replace(/\\neq\b/g,'≠').replace(/\\approx\b/g,'≈')
        .replace(/\\in\b/g,'∈').replace(/\\notin\b/g,'∉')
        .replace(/\\subset/g,'⊂').replace(/\\cup/g,'∪').replace(/\\cap/g,'∩')
        .replace(/\\infty/g,'∞').replace(/\\pm/g,'±')
        .replace(/\\alpha/g,'α').replace(/\\beta/g,'β').replace(/\\gamma/g,'γ')
        .replace(/\\delta/g,'δ').replace(/\\epsilon/g,'ε').replace(/\\varepsilon/g,'ε')
        .replace(/\\sigma/g,'σ').replace(/\\lambda/g,'λ').replace(/\\mu/g,'μ')
        .replace(/\\phi/g,'φ').replace(/\\varphi/g,'φ').replace(/\\psi/g,'ψ')
        .replace(/\\omega/g,'ω').replace(/\\theta/g,'θ')
        .replace(/\\top/g,'ᵀ').replace(/\\cdot/g,'·')
        .replace(/\\ldots/g,'…').replace(/\\cdots/g,'…')
        .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g,'($1)/($2)')
        .replace(/\^/g,'').replace(/_/g,'').replace(/\{|\}/g,'')
        .replace(/\\/g,'').trim();
    });
}

/* ============================================================
   PDF EXPORT  –  uses html2pdf.js
   ============================================================ */
async function exportToPDF() {
  notify('⏳ 正在生成 PDF…', 15000);
  await new Promise(r => setTimeout(r, 60));
  readCoverFromDOM();

  if (!window.html2pdf) {
    const ok = await new Promise(resolve => {
      const t0 = Date.now();
      const iv = setInterval(() => {
        if (window.html2pdf) { clearInterval(iv); resolve(true); }
        else if (Date.now() - t0 > 15000) { clearInterval(iv); resolve(false); }
      }, 200);
    });
    if (!ok) { notify('❌ html2pdf.js 加载超时，请检查网络后刷新', 6000); return; }
  }

  const pageDecor = getPageDecorSettings();
  const sourcePage = document.getElementById('document-page');
  const sourceCover = document.getElementById('cover-page');
  const sourceContent = document.getElementById('doc-content');
  if (!sourcePage || !sourceContent) { notify('❌ 未找到页面内容', 5000); return; }

  const CSS_VARS = [
    '--h0-font','--h0-size','--h0-weight','--h0-align',
    '--body-font','--body-size','--body-lh',
    '--h1-font','--h1-size','--h1-weight','--h1-align',
    '--h2-font','--h2-size','--h2-weight','--h2-align',
    '--h3-font','--h3-size','--h3-weight','--h3-align',
    '--page-top','--page-right','--page-bottom','--page-left','--page-gutter'
  ];
  const srcCS = getComputedStyle(sourcePage);

  const container = document.createElement('div');
  container.style.cssText = 'position:absolute;top:0;left:0;width:210mm;background:#fff;overflow:visible;z-index:2147483647;';
  CSS_VARS.forEach(v => {
    const val = srcCS.getPropertyValue(v).trim();
    if (val) container.style.setProperty(v, val);
  });
  document.body.appendChild(container);

  function makePage() {
    const page = document.createElement('div');
    page.className = 'pdf-export-page';
    const hdr = document.createElement('div');
    hdr.className = 'pdf-page-header';
    ['left','center','right'].forEach(side => {
      const s = document.createElement('span');
      s.className = `hdr-${side}`;
      hdr.appendChild(s);
    });
    const contentOuter = document.createElement('div');
    contentOuter.className = 'pdf-page-content';
    const contentInner = document.createElement('div');
    contentInner.className = 'pdf-doc-content';
    contentOuter.appendChild(contentInner);
    const ftr = document.createElement('div');
    ftr.className = 'pdf-page-footer';
    ['left','center','right'].forEach(side => {
      const s = document.createElement('span');
      s.className = `ftr-${side}`;
      ftr.appendChild(s);
    });
    page.appendChild(hdr);
    page.appendChild(contentOuter);
    page.appendChild(ftr);
    container.appendChild(page);
    return { contentOuter, contentInner };
  }

  try {
    let cur = makePage();
    // Export cover first, then body. Strip interactive controls from cover.
    const blocks = [];
    if (sourceCover) {
      for (const b of Array.from(sourceCover.children)) blocks.push(b);
    }
    for (const b of Array.from(sourceContent.children)) blocks.push(b);

    for (const block of blocks) {
      const clone = block.cloneNode(true);
      if (clone.querySelectorAll) {
        clone.querySelectorAll('.cover-actions,.author-remove').forEach(n => n.remove());
      }
      if (clone.classList?.contains('dh1') &&
          clone.textContent.trim() === '参考文献' &&
          cur.contentInner.children.length > 0) {
        cur = makePage();
      }
      cur.contentInner.appendChild(clone);
      if (cur.contentOuter.scrollHeight > cur.contentOuter.clientHeight + 2) {
        cur.contentInner.removeChild(clone);
        cur = makePage();
        cur.contentInner.appendChild(clone);
      }
    }

    const pages = Array.from(container.querySelectorAll('.pdf-export-page'));
    const total = pages.length || 1;
    pages.forEach((page, i) => {
      const label = formatPageLabel(i + 1, total, pageDecor.pageNumFormat);
      if (pageDecor.headerAlign !== 'none') {
        const sp = page.querySelector(`.hdr-${pageDecor.headerAlign}`);
        if (sp) sp.textContent = pageDecor.headerText;
      }
      const pos = pageDecor.pageNumPosition;
      if (pos !== 'none') {
        const [area, side] = pos.split('-');
        const sp = page.querySelector(`.${area === 'header' ? 'hdr' : 'ftr'}-${side}`);
        if (sp) sp.textContent = label;
      }
    });

    container.querySelectorAll('.df-wrap,.df-figure').forEach(el => {
      el.style.breakInside = 'avoid';
      el.style.pageBreakInside = 'avoid';
    });

    const opt = {
      margin: 0,
      filename: '结项报告.pdf',
      image: { type: 'jpeg', quality: 0.97 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        letterRendering: true,
        scrollX: 0,
        scrollY: 0,
        width:  container.offsetWidth  || 794,
        height: Math.floor((container.offsetWidth || 794) * 297 / 210) * pages.length
      },
      pagebreak: { mode: [] },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    await html2pdf().set(opt).from(container).save();
    notify('✅ PDF 下载成功！', 3000);
  } catch (e) {
    notify('❌ PDF 生成失败：' + e.message, 5000);
  } finally {
    container.remove();
  }
}

/* ============================================================
   INIT
   ============================================================ */
function runKaTeX() {
  if (!window.renderMathInElement) return;
  renderMathInElement(document.getElementById('doc-content'), {
    delimiters: [
      { left:'$$', right:'$$', display:true },
      { left:'$',  right:'$',  display:false },
      { left:'\\[', right:'\\]', display:true },
      { left:'\\(',  right:'\\)',  display:false }
    ],
    throwOnError: false
  });
}

// SMOKE_CHECK: Minimal sanity checks to catch accidental deletions of critical cover/editor/export hooks.
function smokeCheck() {
  const mustIds = [
    'document-page',
    'cover-page',
    'doc-content',
  ];
  const missing = mustIds.filter(id => !document.getElementById(id));
  if (missing.length) {
    console.warn('[smokeCheck] missing element ids:', missing.join(', '));
    return false;
  }
  const mustFns = [
    'renderCover',
    'renderContent',
    'readCoverFromDOM',
    'exportToDocx',
    'exportToPDF'
  ];
  const missingFns = mustFns.filter(n => typeof window[n] !== 'function');
  if (missingFns.length) {
    console.warn('[smokeCheck] missing functions:', missingFns.join(', '));
    return false;
  }
  return true;
}

function ensureDefaultTemplateActive() {
  const active = document.querySelector('.tpl.active');
  if (active) return active;
  const fallback = document.querySelector('.tpl[data-tpl="academicReport"]') || document.querySelector('.tpl');
  if (fallback) fallback.classList.add('active');
  return fallback;
}

window.addEventListener('load', () => {
  smokeCheck();
  renderCover();
  renderContent();
  const activeTpl = ensureDefaultTemplateActive();
  if (activeTpl) {
    loadTemplate(activeTpl);
  } else {
    updatePageDecorConflicts();
    applyStyles();
  }
  // Cover author controls (event delegation keeps DOM rebuilds cheap)
  document.getElementById('cover-page')?.addEventListener('click', (e) => {
    const t = e.target;
    if (!(t instanceof HTMLElement)) return;
    const action = t.getAttribute('data-action');
    if (action === 'add-author') {
      e.preventDefault();
      addAuthor();
      return;
    }
    if (action === 'remove-author') {
      e.preventDefault();
      removeAuthor(t.getAttribute('data-index'));
      return;
    }
  });
  // KaTeX may already be loaded (fast CDN) or arrive later via dynamic loader
  if (window.renderMathInElement) {
    runKaTeX();
  } else {
    // will be called by the dynamic loader once auto-render lands
    window._katexCallback = runKaTeX;
  }
});
</script>
